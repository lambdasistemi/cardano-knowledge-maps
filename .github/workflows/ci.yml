name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          node -e "
            const d=require('./data/graph.json');
            const ids=new Set(d.nodes.map(n=>n.id));
            let ok=true;
            d.edges.forEach((e,i)=>{
              if(!ids.has(e.source)){console.error('BAD source e'+i+': '+e.source);ok=false}
              if(!ids.has(e.target)){console.error('BAD target e'+i+': '+e.target);ok=false}
            });
            if(!ok)process.exit(1);
            console.log(d.nodes.length+' nodes, '+d.edges.length+' edges — OK');
          "
      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        run: |
          curl -sL https://lambdasistemi.github.io/graph-browser/index.html -o dist/index.html
          curl -sL https://lambdasistemi.github.io/graph-browser/index.js -o dist/index.js
          cp -r data dist/data
          npx surge dist ${{ github.repository_owner }}-${{ github.event.repository.name }}-pr-${{ github.event.number }}.surge.sh --token ${{ secrets.SURGE_TOKEN }}
